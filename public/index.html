<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Eldrich SMART App - Patient Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; color: #222; }
    .error { color: red; }
    pre { background: #f4f4f4; padding: 10px; border-radius: 6px; overflow-x: auto; }
    #sb-slot { margin-top: 30px; height: 720px; border: 1px solid #ccc; border-radius: 10px; overflow: hidden; }
  </style>

  <!-- Superblocks Embed SDK -->
  <script src="https://prod-cdn.superblocks.com/packages/@superblocksteam/embed@latest/embed.bundle.js"></script>
</head>
<body>
  <h2>SMART on FHIR Example App</h2>
  <p id="status">Loading SMART client...</p>
  <pre id="output"></pre>

  <!-- Container for the embedded Superblocks app -->
  <div id="sb-slot"></div>

  <!-- SMART client -->
  <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.3.10/build/fhir-client.min.js"></script>

  <script>
    function showJSON(obj) {
      document.getElementById("output").textContent = JSON.stringify(obj, null, 2);
    }

    FHIR.oauth2.ready(
      async function (client) {
        console.log("SMART ready ✅");
        document.getElementById("status").textContent = "SMART app connected.";

        const token = client.state?.tokenResponse?.access_token;
        if (!token) {
          document.getElementById("status").textContent = "No token found ";
          console.error("Missing access token:", client.state);
          return;
        }

        try {
          const patient = await client.request(`Patient/${client.patient.id}`);
          console.log("Patient resource:", patient);
          document.getElementById("status").textContent =
            `Loaded patient: ${patient.name?.[0]?.text || "(Unnamed)"}`;
          showJSON(patient);

          // ---- Extract values for properties ----
          const nameObj = (patient.name && patient.name[0]) || {};
          const name =
            nameObj.text ||
            [ ...(nameObj.given || []), nameObj.family ].filter(Boolean).join(" ");
          const dob = patient.birthDate || "";
          const gender = patient.gender || "";

          function findMRN(p) {
            const ids = p.identifier || [];
            const byCode = ids.find(id =>
              (id.type?.coding || []).some(c =>
                c.system === "http://terminology.hl7.org/CodeSystem/v2-0203" && c.code === "MR"
              )
            );
            if (byCode) return byCode.value || byCode._value?.extension?.[0]?.valueString || "";
            const byText = ids.find(id => (id.type?.text || "").toUpperCase() === "MRN");
            if (byText) return byText.value || byText._value?.extension?.[0]?.valueString || "";
            return ids[0]?.value || ids[0]?._value?.extension?.[0]?.valueString || "";
          }
          const mrn = findMRN(patient);

          const safe = v => (v ?? "").toString();

          // ---- Create and mount Superblocks embed WITH PROPERTIES ----
          const sbApp = Superblocks.createSuperblocksEmbed({
            id: "sb-slot",
            src: "https://app.superblocks.com/embed/applications/8b471cc1-c191-4af8-9e6c-dfc867da028d <OR YOUR APPLICATION URL HERE>",
            properties: {
              patientId: safe(client.patient?.id),
              name: safe(name),
              dob: safe(dob),
              gender: safe(gender),
              mrn: safe(mrn)
            }
          });

          const container = document.getElementById("sb-slot");
          container.innerHTML = "";
          container.appendChild(sbApp);

          console.log("Superblocks embed mounted  (properties sent)", sbApp);
        } catch (err) {
          console.error("Failed to fetch patient data:", err);
          document.getElementById("status").innerHTML =
            `<span class='error'>Failed to fetch patient data (Status: ${err.status || "unknown"})</span>`;
          showJSON(err);
        }
      },
      function (error) {
        console.error("SMART initialization failed ", error);
        document.getElementById("status").innerHTML =
          `<span class='error'>SMART Initialization Error</span>`;
        showJSON(error);
      }
    );
  </script>
</body>
</html>
