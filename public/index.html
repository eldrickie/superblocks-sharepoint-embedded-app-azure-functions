<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superblocks Embed</title>
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <script src="https://prod-cdn.superblocks.com/packages/@superblocksteam/embed@latest/embed.bundle.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    #sb-app { width: 100%; height: 100%; }
    #loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh; color: #555; gap: 12px;
    }
    #loading .spinner {
      width: 32px; height: 32px; border: 3px solid #e0e0e0;
      border-top-color: #4f46e5; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error { display: none; padding: 24px; color: #b91c1c; font-size: 14px; text-align: center; }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><span>Loading application...</span></div>
  <div id="sb-app"></div>
  <div id="error"></div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var appId = params.get("appId") || "{{SUPERBLOCKS_APPLICATION_ID}}";
    var loginHint = params.get("loginHint");
    var domainHint = params.get("domainHint");
    var AZURE_CLIENT_ID = "{{AZURE_CLIENT_ID}}";
    var AZURE_TENANT_ID = "{{AZURE_TENANT_ID}}";
    var SB_BASE_URL = params.get("sbBaseUrl") || "{{SUPERBLOCKS_URL}}";

    function showError(msg) {
      document.getElementById("loading").style.display = "none";
      var el = document.getElementById("error");
      el.style.display = "block";
      el.textContent = msg;
    }

    if (!appId) { showError("Missing 'appId' query parameter."); }

    var msalConfig = {
      auth: {
        clientId: AZURE_CLIENT_ID,
        authority: "https://login.microsoftonline.com/" + AZURE_TENANT_ID,
        redirectUri: window.location.origin + window.location.pathname,
      },
      cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: true },
    };

    var msalInstance = new msal.PublicClientApplication(msalConfig);

    async function getEntraToken() {
      var ssoRequest = { scopes: ["User.Read"] };
      if (loginHint) { ssoRequest.loginHint = loginHint; }
      if (domainHint) { ssoRequest.domainHint = domainHint; }

      try {
        var resp = await msalInstance.ssoSilent(ssoRequest);
        return resp.idToken;
      } catch (e) { console.log("ssoSilent failed:", e.message); }

      var accounts = msalInstance.getAllAccounts();
      var tenantAccount = accounts.find(function(a) {
        return a.tenantId === AZURE_TENANT_ID;
      });
      var account = tenantAccount || accounts[0];
      if (account) {
        try {
          var resp = await msalInstance.acquireTokenSilent({ scopes: ["User.Read"], account: account });
          return resp.idToken;
        } catch (e) { console.log("acquireTokenSilent failed:", e.message); }
      }

      showError("Silent authentication failed. If you have multiple Microsoft accounts, add &loginHint=your@email.com to the embed URL.");
      return null;
    }

    async function init() {
      if (!appId) return;
      try {
        await msalInstance.initialize();
        var redirectResp = await msalInstance.handleRedirectPromise();
        var entraToken = redirectResp ? redirectResp.accessToken : await getEntraToken();
        if (!entraToken) return;

        var tokenRes = await fetch(window.location.origin + "/oauth2/token", {
          headers: { "Authorization": "Bearer " + entraToken }
        });
        if (!tokenRes.ok) {
          var errData = await tokenRes.json().catch(function() { return {}; });
          throw new Error(errData.message || "Token exchange failed (" + tokenRes.status + ")");
        }
        var tokenData = await tokenRes.json();

        document.getElementById("loading").style.display = "none";
        var sbApp = Superblocks.createSuperblocksEmbed({
          id: "sb-app",
          src: SB_BASE_URL + "/code-mode/embed/applications/" + appId,
          token: tokenData.access_token,
        });
        document.getElementById("sb-app").appendChild(sbApp);
      } catch (err) {
        console.error("Embed init error:", err);
        showError("Failed to load: " + err.message);
      }
    }

    init();
  </script>
</body>
</html>
